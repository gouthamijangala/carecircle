<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CareCircle Graphify Knowledge Graph Preview</title>
  <desc id="desc">Preview card for the CareCircle Graphify knowledge graph, showing graph statistics and a node-link illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="48%" stop-color="#0f2537"/>
      <stop offset="100%" stop-color="#11261f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#76e4f7" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#76e4f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="76%" cy="66%" r="55%">
      <stop offset="0%" stop-color="#8af29c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8af29c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #a9c4d7; font-size: 22px; letter-spacing: 0.08em; }
      .title { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f5fbff; font-size: 62px; font-weight: 800; letter-spacing: -0.035em; }
      .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #d2e2ed; font-size: 26px; }
      .stat { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; font-size: 42px; font-weight: 800; }
      .statLabel { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #a9c4d7; font-size: 18px; letter-spacing: 0.05em; }
      .small { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #9db7c9; font-size: 19px; }
      .edge { stroke: #7cc7d9; stroke-width: 2.4; stroke-opacity: 0.42; }
      .nodeA { fill: #75e7f7; }
      .nodeB { fill: #8af29c; }
      .nodeC { fill: #f9d36f; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g opacity="0.22">
    <path d="M0 460 C180 400 230 520 390 470 C560 420 620 300 820 350 C990 392 1030 280 1200 315" fill="none" stroke="#d6f7ff" stroke-width="2"/>
    <path d="M0 505 C190 445 310 590 485 510 C660 430 735 500 900 455 C1045 415 1090 470 1200 435" fill="none" stroke="#c7ffd1" stroke-width="2"/>
  </g>

  <rect x="70" y="70" width="1060" height="490" rx="34" fill="#071522" fill-opacity="0.72" stroke="#4f7186" stroke-opacity="0.42" filter="url(#softShadow)"/>

  <text x="112" y="132" class="label">GRAPHIFY KNOWLEDGE GRAPH</text>
  <text x="112" y="210" class="title">CareCircle Codebase Map</text>
  <text x="114" y="262" class="subtitle">Architecture communities, extracted relationships, and inferred links for project navigation.</text>

  <g transform="translate(112 336)">
    <rect width="190" height="120" rx="24" fill="#0d2234" stroke="#5d849b" stroke-opacity="0.45"/>
    <text x="28" y="54" class="stat">3,429</text>
    <text x="30" y="88" class="statLabel">NODES</text>
  </g>
  <g transform="translate(330 336)">
    <rect width="190" height="120" rx="24" fill="#0d2234" stroke="#5d849b" stroke-opacity="0.45"/>
    <text x="28" y="54" class="stat">6,669</text>
    <text x="30" y="88" class="statLabel">EDGES</text>
  </g>
  <g transform="translate(548 336)">
    <rect width="190" height="120" rx="24" fill="#0d2234" stroke="#5d849b" stroke-opacity="0.45"/>
    <text x="28" y="54" class="stat">878</text>
    <text x="30" y="88" class="statLabel">COMMUNITIES</text>
  </g>

  <g transform="translate(780 142)">
    <line class="edge" x1="68" y1="74" x2="190" y2="28"/>
    <line class="edge" x1="68" y1="74" x2="244" y2="124"/>
    <line class="edge" x1="190" y1="28" x2="294" y2="72"/>
    <line class="edge" x1="244" y1="124" x2="294" y2="72"/>
    <line class="edge" x1="244" y1="124" x2="146" y2="205"/>
    <line class="edge" x1="68" y1="74" x2="146" y2="205"/>
    <line class="edge" x1="146" y1="205" x2="310" y2="220"/>
    <line class="edge" x1="294" y1="72" x2="310" y2="220"/>
    <circle class="nodeA" cx="68" cy="74" r="24"/>
    <circle class="nodeB" cx="190" cy="28" r="17"/>
    <circle class="nodeC" cx="244" cy="124" r="21"/>
    <circle class="nodeA" cx="294" cy="72" r="15"/>
    <circle class="nodeB" cx="146" cy="205" r="19"/>
    <circle class="nodeC" cx="310" cy="220" r="26"/>
    <circle fill="#ffffff" cx="68" cy="74" r="7" opacity="0.72"/>
    <circle fill="#ffffff" cx="310" cy="220" r="8" opacity="0.72"/>
  </g>

  <text x="114" y="512" class="small">Open docs/graphify.html for the interactive graph.</text>
</svg>
